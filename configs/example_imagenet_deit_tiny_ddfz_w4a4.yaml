dataset: imagenet1k
data_dir: ./data/imagenet2012
model_key: deit_tiny
model_name: deit_tiny_patch16_224
num_classes: 1000
image_size: 224
normalization: imagenet
method: pcddfz_nodc
w_bits: 4
a_bits: 4
head_quant: w8a8
timm_pretrained: false
pretrained_checkpoint: ./pretrained/deit/deit_tiny_patch16_224.pth
initial_checkpoint: ./pretrained/deit/deit_tiny_patch16_224.pth
epochs: 200
batch_size: 32
val_batch_size: 64
grad_accum_steps: 4
num_workers: 8
lr: 5.0e-05
weight_decay: 0.05
early_stop_min_epochs: 80
early_stop_patience: 20
early_stop_min_delta: 0.05
log_interval: 200
ddp_find_unused_parameters: true
ddp_broadcast_buffers: true
ddp_init_sync: true
seed: 42
output_dir: ./runs/imagenet_qat_ddfz/deit_tiny/ddfz_w4a4
distillation: true
kd_type: logit_soft
distill_alpha: 0.5
distill_tau: 2.0
teacher: ./pretrained/deit/deit_tiny_patch16_224.pth
teacher_checkpoint: ./pretrained/deit/deit_tiny_patch16_224.pth
ddfz_zero_anchor: true
pc_compile_updates_per_epoch: 4
save_checkpoints: true
